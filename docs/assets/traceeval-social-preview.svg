<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="88" y1="72" x2="1178" y2="594" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081826"/>
      <stop offset="0.45" stop-color="#13344A"/>
      <stop offset="1" stop-color="#0E6A73"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="880" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D2233" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#102E3F" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="24" fill="url(#bg)"/>
  <g filter="url(#blur)" opacity="0.6">
    <circle cx="1100" cy="110" r="120" fill="#67E8F9"/>
    <circle cx="1040" cy="500" r="140" fill="#86EFAC"/>
    <circle cx="220" cy="100" r="90" fill="#22D3EE"/>
  </g>

  <rect x="72" y="72" width="1136" height="496" rx="28" fill="#0A1724" fill-opacity="0.26" stroke="rgba(255,255,255,0.12)"/>
  <rect x="108" y="110" width="728" height="360" rx="28" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
  <rect x="874" y="122" width="300" height="124" rx="20" fill="#0B2133" fill-opacity="0.82" stroke="rgba(255,255,255,0.08)"/>
  <rect x="874" y="270" width="300" height="124" rx="20" fill="#0B2133" fill-opacity="0.82" stroke="rgba(255,255,255,0.08)"/>
  <rect x="874" y="418" width="300" height="100" rx="20" fill="#0B2133" fill-opacity="0.82" stroke="rgba(255,255,255,0.08)"/>

  <rect x="144" y="148" width="132" height="34" rx="17" fill="#0E2D3F"/>
  <text x="166" y="170" fill="#90F8C5" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">TRACEEVAL</text>

  <text x="144" y="240" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="66" font-weight="700">Turn production</text>
  <text x="144" y="316" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="66" font-weight="700">failures into evals.</text>
  <text x="144" y="378" fill="#B8D5E3" font-family="Segoe UI, Arial, sans-serif" font-size="28">
    <tspan x="144" dy="0">Cluster incidents, generate reviewable cases, replay regressions,</tspan>
    <tspan x="144" dy="38">and export promptfoo-ready packs.</tspan>
  </text>

  <rect x="144" y="430" width="236" height="16" rx="8" fill="#153347"/>
  <rect x="144" y="430" width="144" height="16" rx="8" fill="url(#accent)"/>
  <circle cx="396" cy="438" r="6" fill="#86EFAC"/>
  <text x="412" y="444" fill="#D0E7F1" font-family="Segoe UI, Arial, sans-serif" font-size="18">continuous eval discovery</text>

  <text x="904" y="164" fill="#89F1C4" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">INGEST</text>
  <text x="904" y="204" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Normalize traces</text>
  <text x="904" y="228" fill="#BED5E3" font-family="Segoe UI, Arial, sans-serif" font-size="16">Deduplicate events and redact sensitive text.</text>

  <text x="904" y="312" fill="#7DE7F4" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">REPLAY</text>
  <text x="904" y="352" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Attribute regressions</text>
  <text x="904" y="376" fill="#BED5E3" font-family="Segoe UI, Arial, sans-serif" font-size="16">Prompt, model, retrieval, and tool change signals.</text>

  <text x="904" y="458" fill="#A5F3FC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">EXPORT</text>
  <text x="904" y="494" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">promptfoo-ready batches</text>

  <path d="M826 186C856 186 856 186 874 186" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M826 334C856 334 856 334 874 334" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M826 468C856 468 856 468 874 468" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
</svg>
